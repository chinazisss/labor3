<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Каталог путешествий </title>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
        body { background: #eef2f7; padding: 2rem 1.5rem; }
        .app-wrapper { max-width: 1300px; margin: 0 auto; }
        h1 { font-size: 2rem; font-weight: 700; color: #1f3e5c; border-left: 5px solid #2c7da0; padding-left: 1.2rem; margin-bottom: 0.4rem; }
        .sub { color: #4b6f8c; margin-bottom: 2rem; padding-left: 1.8rem; font-weight: 500; font-size: 0.95rem; }
        .controls { background: white; border-radius: 28px; padding: 1.5rem 2rem; margin-bottom: 2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.03); border: 1px solid rgba(44,125,160,0.2); }
        .filter-area { display: flex; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.8rem; padding-bottom: 1.2rem; border-bottom: 1px dashed #cbdbe0; }
        .filter-label { font-weight: 600; background: #e9f0f5; padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.85rem; color: #1f5e7e; }
        select { background: #f9fbfd; border: 1px solid #bdd3e4; padding: 0.5rem 1.2rem; border-radius: 40px; font-size: 0.9rem; font-weight: 500; cursor: pointer; outline: none; }
        select:hover { border-color: #2c7da0; }
        .add-form { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; }
        .field { flex: 1 1 180px; display: flex; flex-direction: column; gap: 0.4rem; }
        .field label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #2c7da0; }
        .field input { background: #fefefe; border: 1px solid #cfdfea; padding: 0.6rem 1rem; border-radius: 24px; font-size: 0.9rem; outline: none; }
        .field input:focus { border-color: #2c7da0; box-shadow: 0 0 0 2px rgba(44,125,160,0.2); }
        button { background: #2c7da0; border: none; color: white; font-weight: 600; padding: 0.6rem 1.3rem; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1f5e7e; transform: translateY(-1px); }
        .error-msg { color: #c44536; font-size: 0.75rem; margin-top: 0.6rem; background: #fff2ef; padding: 0.3rem 1rem; border-radius: 20px; display: inline-block; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1.8rem; }
        .travel-card { background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 12px 24px -12px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: 0.25s; }
        .travel-card:hover { transform: translateY(-4px); box-shadow: 0 20px 28px -12px rgba(0,0,0,0.15); }
        .card-content { padding: 1.3rem 1.5rem 1rem; flex: 1; }
        .country-badge { display: inline-block; background: #e1ecf4; color: #1f5e7e; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.8rem; border-radius: 30px; margin-bottom: 0.8rem; }
        .travel-title { font-size: 1.5rem; font-weight: 700; color: #1f3e5c; margin-bottom: 0.5rem; }
        .travel-desc { color: #4a627a; font-size: 0.9rem; line-height: 1.4; margin: 0.7rem 0 1rem; }
        .like-section { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #e9edf2; padding: 0.9rem 1.5rem 1.2rem; background: #fafcff; }
        .like-btn { background: #ffe8e6; color: #bc4e2c; display: flex; align-items: center; gap: 6px; padding: 0.4rem 1rem; border-radius: 50px; font-weight: 600; font-size: 0.85rem; }
        .like-btn:hover { background: #ffdad5; transform: scale(0.98); }
        .like-count { font-weight: 700; background: #eef2fa; padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.85rem; color: #2c7da0; }
        .empty-message { text-align: center; padding: 3rem; background: #f9fafc; border-radius: 2rem; color: #6c86a3; font-size: 1.1rem; }
        footer { margin-top: 2rem; text-align: center; font-size: 0.7rem; color: #7f98af; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const initialTravels = [
            { id: 1, country: "Эстония", name: "Таллиннское средневековье", description: "Старый город, уютные улочки и панорама Балтийского моря.", likes: 0 },
            { id: 2, country: "Россия", name: "Байкальская сказка", description: "Озеро Байкал, ледяные гроты и сибирское гостеприимство.", likes: 0 },
            { id: 3, country: "Германия", name: "Баварские замки", description: "Нойшванштайн, пивные сады и альпийские пейзажи.", likes: 0 },
            { id: 4, country: "Китай", name: "Великая стена", description: "Древняя архитектура, Пекин, традиционная кухня.", likes: 0 },
            { id: 5, country: "Польша", name: "Краковские легенды", description: "Вавельский замок, Рыночная площадь и уютные кафе.", likes: 0 },
            { id: 6, country: "Индонезия", name: "Остров Бали", description: "Храмы, рисовые террасы и серфинг.", likes: 0 }
        ];

        const App = () => {
            const [travels, setTravels] = useState(initialTravels);
            const [selectedCountry, setSelectedCountry] = useState("all");
            const [newCountry, setNewCountry] = useState("");
            const [newName, setNewName] = useState("");
            const [newDesc, setNewDesc] = useState("");
            const [formError, setFormError] = useState("");

            const uniqueCountries = [...new Set(travels.map(t => t.country))];
            const filteredTravels = selectedCountry === "all"
                ? travels
                : travels.filter(t => t.country === selectedCountry);

            const handleLike = (id) => {
                setTravels(prevTravels =>
                    prevTravels.map(travel =>
                        travel.id === id ? { ...travel, likes: travel.likes + 1 } : travel
                    )
                );
            };

            const handleAddTravel = (e) => {
                e.preventDefault();
                if (!newCountry.trim() || !newName.trim() || !newDesc.trim()) {
                    setFormError("Заполните все поля: страна, название и описание");
                    return;
                }
                setFormError("");
                const newId = travels.length > 0 ? Math.max(...travels.map(t => t.id)) + 1 : 1;
                const newTravel = {
                    id: newId,
                    country: newCountry.trim(),
                    name: newName.trim(),
                    description: newDesc.trim(),
                    likes: 0
                };
                setTravels([...travels, newTravel]);
                setNewCountry("");
                setNewName("");
                setNewDesc("");
            };

            return (
                <div className="app-wrapper">
                    <header>
                        <h1>Каталог путешествий</h1>
                        <div className="sub">Открой мир — найди идеальное приключение</div>
                    </header>
                    <div className="controls">
                        <div className="filter-area">
                            <span className="filter-label">Фильтр по стране:</span>
                            <select value={selectedCountry} onChange={(e) => setSelectedCountry(e.target.value)}>
                                <option value="all">Все страны</option>
                                {uniqueCountries.map(country => (
                                    <option key={country} value={country}>{country}</option>
                                ))}
                            </select>
                        </div>
                        <form onSubmit={handleAddTravel} className="add-form">
                            <div className="field">
                                <label>Страна *</label>
                                <input type="text" value={newCountry} onChange={(e) => setNewCountry(e.target.value)} placeholder="Например: Испания" />
                            </div>
                            <div className="field">
                                <label>Название *</label>
                                <input type="text" value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="Название тура" />
                            </div>
                            <div className="field">
                                <label>Краткое описание *</label>
                                <input type="text" value={newDesc} onChange={(e) => setNewDesc(e.target.value)} placeholder="Что вас ждет?" />
                            </div>
                            <button type="submit">Добавить</button>
                        </form>
                        {formError && <div className="error-msg">{formError}</div>}
                    </div>
                    {filteredTravels.length === 0 ? (
                        <div className="empty-message">
                            Нет путешествий для выбранной страны.
                            Добавьте новое или измените фильтр.
                        </div>
                    ) : (
                        <div className="cards-grid">
                            {filteredTravels.map(travel => (
                                <div key={travel.id} className="travel-card">
                                    <div className="card-content">
                                        <div className="country-badge">{travel.country}</div>
                                        <div className="travel-title">{travel.name}</div>
                                        <div className="travel-desc">{travel.description}</div>
                                    </div>
                                    <div className="like-section">
                                        <button className="like-btn" onClick={() => handleLike(travel.id)}>Нравится</button>
                                        <span className="like-count">Лайков: {travel.likes}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                    <footer>
                        Нажмите Нравится — поддержите любимое направление. Добавляйте свои маршруты.
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
